<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registro de Usuario — U4</title>
  <link rel="stylesheet" href="styles.css">
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body>

  <div class="bg-decoration">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
  </div>

  <main class="contenedor">
    <div class="card">
      <div class="card-header">
        <div class="logo-mark">
          <svg width="36" height="36" viewBox="0 0 36 36" fill="none">
            <circle cx="18" cy="18" r="17" stroke="var(--accent)" stroke-width="2"/>
            <path d="M11 18C11 14.134 14.134 11 18 11C21.866 11 25 14.134 25 18" stroke="var(--accent)" stroke-width="2" stroke-linecap="round"/>
            <circle cx="18" cy="21" r="3" fill="var(--accent)"/>
          </svg>
        </div>
        <h1>Crear cuenta</h1>
        <p class="subtitle">Completa el formulario para registrarte</p>
      </div>

      <form id="form-registro" novalidate>

        <div class="campo-grupo">
          <label for="nombre">Nombre completo</label>
          <div class="input-wrapper">
            <input id="nombre" type="text" name="nombre"
                   required minlength="3" maxlength="60"
                   placeholder="Ej: Ana García"
                   autocomplete="name">
            <span class="input-icon">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>
              </svg>
            </span>
          </div>
          <span class="msg-error" id="error-nombre" role="alert"></span>
        </div>

        <div class="campo-grupo">
          <label for="email">Correo electrónico</label>
          <div class="input-wrapper">
            <input id="email" type="email" name="email"
                   required placeholder="usuario@dominio.com"
                   autocomplete="email">
            <span class="input-icon">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                <rect x="2" y="4" width="20" height="16" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/>
              </svg>
            </span>
          </div>
          <span class="msg-error" id="error-email" role="alert"></span>
        </div>

        <div class="campo-grupo">
          <label for="password">Contraseña</label>
          <div class="input-wrapper">
            <input id="password" type="password" name="password"
                   required minlength="8"
                   placeholder="Mínimo 8 caracteres"
                   autocomplete="new-password">
            <button type="button" class="toggle-pass" id="toggle-pass" aria-label="Mostrar contraseña">
              <svg class="eye-open" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                <path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/>
              </svg>
              <svg class="eye-closed" style="display:none" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                <path d="M9.88 9.88a3 3 0 1 0 4.24 4.24"/><path d="M10.73 5.08A10.43 10.43 0 0 1 12 5c7 0 10 7 10 7a13.16 13.16 0 0 1-1.67 2.68"/><path d="M6.61 6.61A13.526 13.526 0 0 0 2 12s3 7 10 7a9.74 9.74 0 0 0 5.39-1.61"/><line x1="2" y1="2" x2="22" y2="22"/>
              </svg>
            </button>
          </div>
          <div id="barra-fortaleza" class="barra-fortaleza">
            <div class="barra-segmentos">
              <span class="segmento" id="seg-1"></span>
              <span class="segmento" id="seg-2"></span>
              <span class="segmento" id="seg-3"></span>
              <span class="segmento" id="seg-4"></span>
            </div>
            <span id="fortaleza-label" class="fortaleza-label"></span>
          </div>
          <span class="msg-error" id="error-password" role="alert"></span>
        </div>

        <div class="campo-grupo">
          <label for="confirmar">Confirmar contraseña</label>
          <div class="input-wrapper">
            <input id="confirmar" type="password" name="confirmar"
                   required placeholder="Repita la contraseña"
                   autocomplete="new-password">
            <span class="input-icon">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
              </svg>
            </span>
          </div>
          <span class="msg-error" id="error-confirmar" role="alert"></span>
        </div>

        <div class="campo-grupo">
          <label for="telefono">Teléfono <span class="opcional">(opcional)</span></label>
          <div class="input-wrapper">
            <input id="telefono" type="tel" name="telefono"
                   pattern="[0-9]{7,15}"
                   placeholder="Solo dígitos, 7–15 caracteres"
                   autocomplete="tel">
            <span class="input-icon">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.28 12a19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 3.18 1.1h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L7.91 8.96a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92Z"/>
              </svg>
            </span>
          </div>
          <span class="msg-error" id="error-telefono" role="alert"></span>
        </div>

        <button type="submit" id="btn-registrar">
          <span class="btn-text">Registrarse</span>
          <svg class="btn-arrow" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/>
          </svg>
        </button>

        <div id="mensaje-exito" class="oculto" role="status" aria-live="polite">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="20 6 9 17 4 12"/>
          </svg>
          Registro exitoso. ¡Bienvenido al sistema!
        </div>

      </form>
    </div>
  </main>

  <script src="validacion.js" defer></script>
</body>
</html>
